<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双臂机器人 - 布料折叠演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
        
        .container { display: flex; height: 100vh; }
        
        .simulation { flex: 1; position: relative; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        .panel { 
            width: 320px; background: #222; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        
        .title { color: #00d4ff; text-align: center; font-size: 16px; font-weight: bold; }
        .subtitle { color: #ff6b6b; text-align: center; font-size: 12px; }
        
        .info-box {
            background: #111; padding: 15px; border-radius: 8px;
            border: 1px solid #333;
        }
        .info-box h4 { color: #00d4ff; margin-bottom: 10px; font-size: 12px; }
        .info-box p { font-size: 11px; color: #888; line-height: 1.6; }
        
        .strategy-btns { display: flex; flex-direction: column; gap: 8px; }
        
        .strategy-btn {
            padding: 12px; border-radius: 8px; border: 2px solid #333;
            background: transparent; color: #fff; font-size: 12px; cursor: pointer;
            text-align: left; transition: all 0.2s;
        }
        .strategy-btn:hover { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .strategy-btn.active { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .strategy-btn .name { font-weight: bold; color: #00d4ff; }
        .strategy-btn .desc { font-size: 10px; color: #666; margin-top: 4px; }
        
        .status { background: #111; padding: 15px; border-radius: 8px; }
        .status-row { display: flex; justify-content: space-between; margin: 5px 0; font-family: monospace; font-size: 11px; }
        .status .label { color: #666; }
        .status .value { color: #00ff88; }
        
        .control-btns { display: flex; gap: 10px; }
        .control-btn {
            flex: 1; padding: 15px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-start { background: #00ff88; color: #000; }
        .btn-reset { background: #ff4444; }
        
        .progress-bar {
            height: 8px; background: #333; border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88);
            width: 0%; transition: width 0.3s;
        }
        
        .back { display: block; text-align: center; padding: 15px; color: #00d4ff; text-decoration: none; }
        
        .physics-info {
            font-size: 10px; color: #666; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="simulation">
            <canvas id="canvas"></canvas>
            <div class="status" style="position:absolute; top:10px; left:10px;">
                <div class="status-row"><span class="label">左臂角度</span><span class="value" id="armL">0°</span></div>
                <div class="status-row"><span class="label">右臂角度</span><span class="value" id="armR">0°</span></div>
                <div class="status-row"><span class="label">完成度</span><span class="value" id="progress">0%</span></div>
            </div>
        </div>
        
        <div class="panel">
            <div>
                <div class="title">🤖 双臂机器人</div>
                <div class="subtitle">布料折叠演示</div>
            </div>
            
            <div class="info-box">
                <h4>📋 任务说明</h4>
                <p>使用双臂机器人将布料从左侧折叠到右侧。不同的运动规划策略会产生不同的运动轨迹和效果。</p>
            </div>
            
            <div class="info-box">
                <h4>🎯 运动规划策略</h4>
                <div class="strategy-btns">
                    <button class="strategy-btn active" data-strategy="ptp" onclick="setStrategy('ptp')">
                        <div class="name">PTP (点对点)</div>
                        <div class="desc">快速到达目标，轨迹生硬</div>
                    </button>
                    <button class="strategy-btn" data-strategy="linear" onclick="setStrategy('linear')">
                        <div class="name">Linear (直线插值)</div>
                        <div class="desc">直线运动，轨迹平滑</div>
                    </button>
                    <button class="strategy-btn" data-strategy="joint" onclick="setStrategy('joint')">
                        <div class="name">Joint (关节插值)</div>
                        <div class="desc">关节空间平滑过渡</div>
                    </button>
                    <button class="strategy-btn" data-strategy="circular" onclick="setStrategy('circular')">
                        <div class="name">Circular (圆弧插值)</div>
                        <div class="desc">沿圆弧运动</div>
                    </button>
                    <button class="strategy-btn" data-strategy="bezier" onclick="setStrategy('bezier')">
                        <div class="name">Bezier (贝塞尔曲线)</div>
                        <div class="desc">平滑曲线，优雅运动</div>
                    </button>
                </div>
            </div>
            
            <div class="status">
                <div class="status-row"><span class="label">当前策略</span><span class="value" id="strategyName">PTP</span></div>
                <div class="status-row"><span class="label">任务状态</span><span class="value" id="taskStatus">待机</span></div>
                <div class="status-row"><span class="label">耗时</span><span class="value" id="elapsed">0.0s</span></div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            
            <div class="control-btns">
                <button class="control-btn btn-start" onclick="startTask()">▶ 开始任务</button>
                <button class="control-btn btn-reset" onclick="resetTask()">↺ 重置</button>
            </div>
            
            <div class="physics-info">
                Cannon.js 物理引擎 | 运动学解算
            </div>
            
            <a href="/demo1/" class="back">← 返回机器狗Demo</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== Three.js 场景 ==========
        
        let scene, camera, renderer;
        let robot, leftArm, rightArm, cloth;
        let arms = { left: [], right: [] };
        
        // 任务状态
        const task = {
            running: false,
            strategy: 'ptp',
            phase: 0,
            progress: 0,
            startTime: 0,
            clothPos: { x: -1.5, z: 0 },
            targetPos: { x: 1.5, z: 0 }
        };
        
        function init() {
            const canvas = document.getElementById('canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 4, 6);
            camera.lookAt(0, 1, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            
            // 灯光
            scene.add(new THREE.AmbientLight(0x404040, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // 地面
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 10),
                new THREE.MeshStandardMaterial({ color: 0x222233 })
            );
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 网格
            scene.add(new THREE.GridHelper(10, 20, 0x00d4ff, 0x333355));
            
            // 创建桌子
            createTable();
            
            // 创建机器人
            createRobot();
            
            // 创建布料
            createCloth();
            
            animate();
        }
        
        function createTable() {
            // 桌子
            const tableMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const table = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 2), tableMat);
            table.position.set(0, 0.8, 0);
            table.receiveShadow = true;
            scene.add(table);
            
            // 桌腿
            const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            [[-2.8, -0.8], [2.8, -0.8], [-2.8, 0.8], [2.8, 0.8]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), legMat);
                leg.position.set(pos[0], 0.4, pos[1]);
                scene.add(leg);
            });
        }
        
        function createRobot() {
            // 机器人基座
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.8 });
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.3, 32), baseMat);
            base.position.set(0, 0.95, 0);
            base.castShadow = true;
            scene.add(base);
            
            // 躯干
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.3), baseMat);
            torso.position.set(0, 1.35, 0);
            torso.castShadow = true;
            scene.add(torso);
            
            // 头部
            const headMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, metalness: 0.9 });
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.2, 0.25), headMat);
            head.position.set(0, 1.7, 0);
            head.castShadow = true;
            scene.add(head);
            
            // 眼睛
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            [[0.06, 0.06], [0.06, -0.06]].forEach(pos => {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), eyeMat);
                eye.position.set(0.13, 1.72, pos[1]);
                scene.add(eye);
            });
            
            // 创建双臂
            createArm(-0.25, 'left');
            createArm(0.25, 'right');
        }
        
        function createArm(xOffset, side) {
            const armMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, metalness: 0.7 });
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.9 });
            
            const armGroup = new THREE.Group();
            armGroup.position.set(xOffset, 1.55, 0);
            
            // 肩关节
            const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), jointMat);
            armGroup.add(shoulder);
            
            // 上臂
            const upperArm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.4, 0.06), armMat);
            upperArm.position.set(0, -0.2, 0);
            upperArm.castShadow = true;
            armGroup.add(upperArm);
            
            // 肘关节
            const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), jointMat);
            elbow.position.set(0, -0.4, 0);
            armGroup.add(elbow);
            
            // 前臂
            const forearm = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.35, 0.05), armMat);
            forearm.position.set(0, -0.6, 0);
            forearm.castShadow = true;
            armGroup.add(forearm);
            
            // 手/夹爪
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.12), jointMat);
            hand.position.set(0, -0.8, 0);
            armGroup.add(hand);
            
            scene.add(armGroup);
            arms[side].push(armGroup);
            
            // 保存关节角度
            arms[side].angles = { shoulder: 0, elbow: 0 };
        }
        
        function createCloth() {
            // 布料 (用平面模拟)
            const clothMat = new THREE.MeshStandardMaterial({ 
                color: 0xff6b6b, 
                side: THREE.DoubleSide,
                roughness: 0.8
            });
            cloth = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.8, 10, 8), clothMat);
            cloth.rotation.x = -Math.PI/2;
            cloth.position.set(-1.5, 0.86, 0);
            cloth.castShadow = true;
            scene.add(cloth);
        }
        
        // ========== 运动规划策略 ==========
        
        function setStrategy(strategy) {
            task.strategy = strategy;
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.strategy === strategy);
            });
            document.getElementById('strategyName').textContent = 
                {ptp:'PTP', linear:'Linear', joint:'Joint', circular:'Circular', bezier:'Bezier'}[strategy];
        }
        
        // 路径点计算
        function calculatePath(start, end, strategy) {
            const points = [];
            const steps = 50;
            
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                let x, y, z;
                
                switch(strategy) {
                    case 'ptp':
                        // 点对点 - 快速但生硬
                        x = start.x + (end.x - start.x) * Math.min(t * 3, 1);
                        y = start.y + (end.y - start.y) * Math.sin(t * Math.PI);
                        z = start.z + (end.z - start.z) * Math.min(t * 3, 1);
                        break;
                        
                    case 'linear':
                        // 直线插值 - 平滑直线
                        x = start.x + (end.x - start.x) * t;
                        y = start.y + (end.y - start.y) * t;
                        z = start.z + (end.z - start.z) * t;
                        break;
                        
                    case 'joint':
                        // 关节插值 - 平滑过渡
                        constjt = (1 - Math.cos(t * Math.PI)) / 2;
                        x = start.x + (end.x - start.x) *jt;
                        y = start.y + (end.y - start.y) *jt;
                        z = start.z + (end.z - start.z) *jt;
                        break;
                        
                    case 'circular':
                        // 圆弧插值
                        const angle = t * Math.PI * 0.5;
                        const midY = Math.max(start.y, end.y) + 0.3;
                        x = start.x + (end.x - start.x) * t;
                        y = start.y + (midY - start.y) * Math.sin(angle) + (end.y - start.y) * t;
                        z = start.z + (end.z - start.z) * t;
                        break;
                        
                    case 'bezier':
                        // 贝塞尔曲线
                        const cp = { // 控制点
                            x: (start.x + end.x) / 2,
                            y: Math.max(start.y, end.y) + 0.5,
                            z: (start.z + end.z) / 2 + 0.3
                        };
                        const bt = 1 - t;
                        x = bt*bt*start.x + 2*bt*t*cp.x + t*t*end.x;
                        y = bt*bt*start.y + 2*bt*t*cp.y + t*t*end.y;
                        z = bt*bt*start.z + 2*bt*t*cp.z + t*t*end.z;
                        break;
                }
                points.push({ x, y, z });
            }
            return points;
        }
        
        // 逆运动学 (简化版)
        function inverseKinematics(targetPos, side) {
            // 简化: 根据目标位置计算关节角度
            const dx = targetPos.x - (side === 'left' ? -0.25 : 0.25);
            const dy = targetPos.y - 1.55;
            const dz = targetPos.z;
            
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            
            // 简化的角度计算
            const shoulderAngle = Math.atan2(dz, -dy) * 0.5;
            const elbowAngle = (dist - 0.6) * 0.5;
            
            return { shoulder: shoulderAngle, elbow: elbowAngle };
        }
        
        // ========== 任务控制 ==========
        
        function startTask() {
            if (task.running) return;
            
            task.running = true;
            task.phase = 1;
            task.progress = 0;
            task.startTime = Date.now();
            
            document.getElementById('taskStatus').textContent = '运行中';
            
            // 运动路径
            const startPos = { x: -1.2, y: 0.9, z: 0 };
            const liftPos = { x: -0.5, y: 1.5, z: 0 };
            const foldPos = { x: 0.5, y: 1.5, z: 0 };
            const endPos = { x: 1.2, y: 0.9, z: 0 };
            
            task.path = [
                ...calculatePath(startPos, liftPos, task.strategy),
                ...calculatePath(liftPos, foldPos, task.strategy),
                ...calculatePath(foldPos, endPos, task.strategy)
            ];
        }
        
        function resetTask() {
            task.running = false;
            task.phase = 0;
            task.progress = 0;
            
            // 重置布料位置
            cloth.position.set(-1.5, 0.86, 0);
            cloth.rotation.set(-Math.PI/2, 0, 0);
            
            // 重置手臂
            arms.left[0].rotation.set(0, 0, 0);
            arms.right[0].rotation.set(0, 0, 0);
            
            document.getElementById('taskStatus').textContent = '待机';
            document.getElementById('progress').textContent = '0%';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('elapsed').textContent = '0.0s';
        }
        
        function updateTask() {
            if (!task.running) return;
            
            const pathIndex = Math.floor(task.progress * task.path.length);
            
            if (pathIndex >= task.path.length) {
                // 任务完成
                task.running = false;
                task.progress = 1;
                document.getElementById('taskStatus').textContent = '完成!';
                
                // 更新布料最终位置
                cloth.position.set(1.5, 0.86, 0);
                return;
            }
            
            const target = task.path[pathIndex];
            
            // 移动布料
            cloth.position.x = target.x;
            cloth.position.y = target.y - 0.05;
            
            // 移动手臂 (两只手臂一起)
            const ik = inverseKinematics(target, 'left');
            arms.left[0].rotation.z = ik.shoulder;
            arms.left[0].rotation.x = ik.elbow;
            
            arms.right[0].rotation.z = ik.shoulder;
            arms.right[0].rotation.x = -ik.elbow;
            
            // 更新UI
            const angle = (ik.shoulder * 180 / Math.PI).toFixed(0);
            document.getElementById('armL').textContent = angle + '°';
            document.getElementById('armR').textContent = angle + '°';
            
            // 更新进度
            document.getElementById('progress').textContent = Math.floor(task.progress * 100) + '%';
            document.getElementById('progressBar').style.width = (task.progress * 100) + '%';
            
            // 更新耗时
            const elapsed = (Date.now() - task.startTime) / 1000;
            document.getElementById('elapsed').textContent = elapsed.toFixed(1) + 's';
            
            // 推进进度
            task.progress += 0.008;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            updateTask();
            
            // 渲染
            renderer.render(scene, camera);
        }
        
        // 窗口调整
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('canvas');
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        });
        
        init();
    </script>
</body>
</html>
