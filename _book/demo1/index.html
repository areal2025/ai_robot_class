<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器狗仿真 - PyBullet Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            color: #00ff88;
        }
        
        .header a {
            color: #00ff88;
            text-decoration: none;
        }
        
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        
        .simulation {
            flex: 2;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        #canvas-container {
            width: 100%;
            height: 500px;
        }
        
        .controls {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
        }
        
        .controls h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .gamepad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, #3a3a5c, #2a2a4c);
            border: 2px solid #00ff88;
            color: #00ff88;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            user-select: none;
        }
        
        .btn:active, .btn.active {
            background: #00ff88;
            color: #1a1a2e;
            transform: scale(0.95);
        }
        
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-stop { grid-column: 2; grid-row: 2; background: #ff4444; border-color: #ff4444; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .btn-a { grid-column: 3; grid-row: 1; background: #ff6b6b; border-color: #ff6b6b; }
        .btn-b { grid-column: 2; grid-row: 1; background: #4ecdc4; border-color: #4ecdc4; }
        
        .action-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .jump-btn {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        
        .shake-btn {
            background: linear-gradient(145deg, #4ecdc4, #3dbdb5);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,255,136,0.3);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
        
        .status-label { color: #888; }
        .status-value { color: #00ff88; }
        
        .keyboard-hint {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }
        
        .bounce { animation: bounce 0.5s ease; }
        .shake { animation: shake 0.3s ease; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐕 基于PyBullet的机器狗仿真</h1>
        <a href="/">← 返回课程首页</a>
    </div>
    
    <div class="container">
        <div class="simulation">
            <div id="canvas-container"></div>
        </div>
        
        <div class="controls">
            <h2>🎮 游戏手柄控制面板</h2>
            
            <div class="gamepad">
                <button class="btn btn-up" data-key="w">▲</button>
                <button class="btn btn-left" data-key="a">◀</button>
                <button class="btn btn-stop" data-key="s">■</button>
                <button class="btn btn-right" data-key="d">▶</button>
                <button class="btn btn-down" data-key="x">▼</button>
                <button class="btn btn-a" data-key="j">A</button>
                <button class="btn btn-b" data-key="k">B</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn jump-btn" id="jumpBtn">🦘 跳跃 (J)</button>
                <button class="action-btn shake-btn" id="shakeBtn">💫 摇头 (K)</button>
            </div>
            
            <div class="status">
                <div class="status-item">
                    <span class="status-label">状态</span>
                    <span class="status-value" id="status">待机</span>
                </div>
                <div class="status-item">
                    <span class="status-label">位置 X</span>
                    <span class="status-value" id="posX">0.00</span>
                </div>
                <div class="status-item">
                    <span class="status-label">位置 Y</span>
                    <span class="status-value" id="posY">0.00</span>
                </div>
                <div class="status-item">
                    <span class="status-label">速度</span>
                    <span class="status-value" id="velocity">0.00</span>
                </div>
                <div class="status-item">
                    <span class="status-label">角度</span>
                    <span class="status-value" id="angle">0°</span>
                </div>
            </div>
            
            <div class="keyboard-hint">
                键盘控制: W/A/S/D 移动 | J 跳跃 | K 摇头
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script>
        // Three.js setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        // Ground
        const groundGeometry = new THREE.PlaneGeometry(30, 30);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x222233,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x00ff88, 0x333355);
        scene.add(gridHelper);
        
        // Robot Dog (simplified as a body with legs)
        const robotDog = new THREE.Group();
        
        // Body
        const bodyGeometry = new THREE.BoxGeometry(2, 0.5, 1);
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff88 });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 1;
        body.castShadow = true;
        robotDog.add(body);
        
        // Head
        const headGeometry = new THREE.BoxGeometry(0.6, 0.5, 0.5);
        const head = new THREE.Mesh(headGeometry, bodyMaterial);
        head.position.set(1.3, 1.2, 0);
        robotDog.add(head);
        
        // Eyes
        const eyeGeometry = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(1.6, 1.3, 0.2);
        robotDog.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(1.6, 1.3, -0.2);
        robotDog.add(rightEye);
        
        // Legs
        const legGeometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
        const legMaterial = new THREE.MeshStandardMaterial({ color: 0x00cc66 });
        
        const legPositions = [
            { x: 0.7, z: 0.4 },   // front-left
            { x: 0.7, z: -0.4 },  // front-right
            { x: -0.7, z: 0.4 },  // back-left
            { x: -0.7, z: -0.4 }  // back-right
        ];
        
        const legs = [];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeometry, legMaterial);
            leg.position.set(pos.x, 0.4, pos.z);
            leg.castShadow = true;
            robotDog.add(leg);
            legs.push(leg);
        });
        
        // Tail
        const tailGeometry = new THREE.BoxGeometry(0.4, 0.15, 0.15);
        const tail = new THREE.Mesh(tailGeometry, bodyMaterial);
        tail.position.set(-1.3, 1.3, 0);
        robotDog.add(tail);
        
        scene.add(robotDog);
        
        // Physics (Cannon.js - PyBullet-like)
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        
        // Ground physics
        const groundBody = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Plane()
        });
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);
        
        // Robot physics
        const robotBody = new CANNON.Body({
            mass: 5,
            shape: new CANNON.Box(new CANNON.Vec3(1, 0.25, 0.5)),
            position: new CANNON.Vec3(0, 2, 0),
            linearDamping: 0.5,
            angularDamping: 0.5
        });
        world.addBody(robotBody);
        
        // Control state
        const state = {
            moving: false,
            direction: { x: 0, z: 0 },
            velocity: 0,
            jumping: false,
            shaking: false
        };
        
        // Keyboard controls
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            handleKey(e.key.toLowerCase());
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        function handleKey(key) {
            const btnMap = {
                'w': '.btn-up',
                'a': '.btn-left', 
                's': '.btn-stop',
                'd': '.btn-right',
                'j': '#jumpBtn',
                'k': '#shakeBtn'
            };
            
            const btn = document.querySelector(btnMap[key]);
            if (btn) {
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 150);
            }
            
            switch(key) {
                case 'w': moveForward(); break;
                case 's': stop(); break;
                case 'a': turnLeft(); break;
                case 'd': turnRight(); break;
                case 'j': jump(); break;
                case 'k': shake(); break;
            }
        }
        
        // Button controls
        document.querySelector('.btn-up').addEventListener('click', moveForward);
        document.querySelector('.btn-left').addEventListener('click', turnLeft);
        document.querySelector('.btn-stop').addEventListener('click', stop);
        document.querySelector('.btn-right').addEventListener('click', turnRight);
        document.querySelector('#jumpBtn').addEventListener('click', jump);
        document.querySelector('#shakeBtn').addEventListener('click', shake);
        
        function moveForward() {
            state.direction.z = -1;
            state.velocity = 3;
            updateStatus('前进');
        }
        
        function turnLeft() {
            robotBody.angularVelocity.y = 2;
            updateStatus('左转');
        }
        
        function turnRight() {
            robotBody.angularVelocity.y = -2;
            updateStatus('右转');
        }
        
        function stop() {
            state.direction = { x: 0, z: 0 };
            state.velocity = 0;
            robotBody.velocity.x = 0;
            robotBody.velocity.z = 0;
            robotBody.angularVelocity.y = 0;
            updateStatus('待机');
        }
        
        function jump() {
            if (!state.jumping && robotBody.position.y < 1.5) {
                state.jumping = true;
                robotBody.velocity.y = 8;
                updateStatus('跳跃');
                
                // Leg animation
                legs.forEach((leg, i) => {
                    setTimeout(() => {
                        leg.position.y = 0.8;
                        setTimeout(() => leg.position.y = 0.4, 200);
                    }, i * 50);
                });
                
                setTimeout(() => {
                    state.jumping = false;
                }, 1000);
            }
        }
        
        function shake() {
            if (!state.shaking) {
                state.shaking = true;
                updateStatus('摇头');
                
                let shakeCount = 0;
                const shakeInterval = setInterval(() => {
                    head.rotation.z = Math.sin(shakeCount * Math.PI / 2) * 0.3;
                    tail.rotation.z = Math.sin(shakeCount * Math.PI / 2) * 0.5;
                    shakeCount++;
                    
                    if (shakeCount > 6) {
                        clearInterval(shakeInterval);
                        head.rotation.z = 0;
                        tail.rotation.z = 0;
                        state.shaking = false;
                    }
                }, 100);
            }
        }
        
        function updateStatus(status) {
            document.getElementById('status').textContent = status;
        }
        
        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Update physics
            world.step(1/60);
            
            // Apply movement
            if (state.velocity > 0) {
                const angle = robotBody.quaternion.y || 0;
                robotBody.velocity.x = Math.sin(angle) * state.velocity;
                robotBody.velocity.z = Math.cos(angle) * state.velocity;
                
                // Leg animation when moving
                legs.forEach((leg, i) => {
                    leg.position.y = 0.4 + Math.sin(time * 10 + i * Math.PI / 2) * 0.1;
                });
            }
            
            // Sync Three.js with physics
            robotDog.position.copy(robotBody.position);
            robotDog.quaternion.copy(robotBody.quaternion);
            
            // Update UI
            document.getElementById('posX').textContent = robotBody.position.x.toFixed(2);
            document.getElementById('posY').textContent = robotBody.position.y.toFixed(2);
            document.getElementById('velocity').textContent = 
                Math.sqrt(robotBody.velocity.x**2 + robotBody.velocity.z**2).toFixed(2);
            
            // Camera follow
            camera.position.x = robotDog.position.x + 5;
            camera.position.z = robotDog.position.z + 5;
            camera.lookAt(robotDog.position);
            
            renderer.render(scene, camera);
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        animate();
        
        // Welcome message
        console.log('🐕 机器狗仿真已启动！');
        console.log('使用键盘 W/A/S/D 控制移动，J 跳跃，K 摇头');
    </script>
</body>
</html>
