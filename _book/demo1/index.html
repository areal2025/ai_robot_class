<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器狗仿真 - PyBullet Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%); min-height: 100vh; color: #fff; }
        
        .header { background: linear-gradient(90deg, #00d4ff 0%, #7b2ff7 100%); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .header .logo { width: 40px; height: 40px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #00d4ff; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        
        .container { display: flex; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        
        .simulation-panel { flex: 2; min-width: 500px; background: #000; border-radius: 15px; overflow: hidden; position: relative; }
        #canvas-container { width: 100%; height: 450px; position: relative; }
        
        .robot-info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; }
        .robot-info .label { color: #888; }
        .robot-info .value { color: #00ff88; }
        
        .physics-info { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 11px; text-align: right; }
        .physics-info .title { color: #00d4ff; font-weight: bold; margin-bottom: 8px; }
        .physics-info .value { color: #ffaa00; }
        
        .controller-panel { flex: 1; min-width: 350px; background: linear-gradient(180deg, #2a2a3a 0%, #1a1a2a 100%); border-radius: 20px; padding: 20px; }
        .controller-title { text-align: center; color: #00d4ff; font-size: 14px; margin-bottom: 15px; letter-spacing: 2px; }
        
        .controller-screen { background: #000; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .screen-line { display: flex; justify-content: space-between; font-family: monospace; font-size: 12px; margin: 8px 0; }
        .screen-line .label { color: #666; }
        .screen-line .value { color: #00ff88; }
        
        .joystick-area { display: flex; justify-content: space-around; margin: 20px 0; }
        .joystick-container { width: 120px; height: 120px; background: radial-gradient(circle, #1a1a2a 0%, #0a0a1a 100%); border-radius: 50%; position: relative; border: 3px solid #333; }
        .joystick-base { width: 80px; height: 80px; background: #333; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .joystick-stick { width: 50px; height: 50px; background: linear-gradient(145deg, #00d4ff, #0088aa); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; }
        .joystick-label { text-align: center; margin-top: 10px; font-size: 12px; color: #888; }
        .joystick-container-right { width: 100px; height: 100px; }
        .joystick-stick-right { width: 40px; height: 40px; background: linear-gradient(145deg, #ff6b6b, #cc4444); }
        
        .button-row { display: flex; justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 15px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .ctrl-btn.emergency { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(145deg, #ff4444, #cc0000); }
        .ctrl-btn.jump { background: linear-gradient(145deg, #ffaa00, #cc8800); }
        .ctrl-btn.stand { background: linear-gradient(145deg, #00ff88, #00cc66); }
        .ctrl-btn.sit { background: linear-gradient(145deg, #4ecdc4, #3aa8a0); }
        
        .mode-switch { display: flex; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .mode-btn { padding: 10px 20px; border: 2px solid #333; background: transparent; color: #666; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .mode-btn.active { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        
        .body-control { margin: 15px 0; }
        .slider-group { margin: 12px 0; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
        .slider-label .value { color: #00d4ff; }
        input[type="range"] { width: 100%; height: 8px; -webkit-appearance: none; background: #1a1a2a; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #00d4ff; border-radius: 50%; cursor: pointer; }
        
        .keyboard-hint { text-align: center; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 12px; color: #888; margin-top: 15px; }
        .back-link { display: block; text-align: center; padding: 20px; color: #00d4ff; text-decoration: none; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="header">
        <h1><div class="logo">P</div>PyBullet 机器狗仿真</h1>
        <div class="status-dot"></div>
    </div>

    <div class="container">
        <div class="simulation-panel">
            <div id="canvas-container">
                <canvas id="sim-canvas"></canvas>
            </div>
            <div class="robot-info">
                <div><span class="label">位置 X:</span> <span class="value" id="posX">0.00</span></div>
                <div><span class="label">位置 Y:</span> <span class="value" id="posY">0.00</span></div>
                <div><span class="label">位置 Z:</span> <span class="value" id="posZ">0.00</span></div>
                <div><span class="label">速度:</span> <span class="value" id="vel">0.00</span></div>
                <div><span class="label">模式:</span> <span class="value" id="mode">STAND</span></div>
            </div>
            <div class="physics-info">
                <div class="title">PyBullet Physics</div>
                <div><span class="label">重力:</span> <span class="value">-9.81 m/s²</span></div>
                <div><span class="label">时间步:</span> <span class="value">1/240 s</span></div>
                <div><span class="label">阻尼:</span> <span class="value">0.5</span></div>
                <div><span class="label">摩擦:</span> <span class="value">0.7</span></div>
            </div>
        </div>

        <div class="controller-panel">
            <div class="controller-title">UNITREE REMOTE CONTROLLER</div>
            
            <div class="controller-screen">
                <div class="screen-line"><span class="label">电池</span><span class="value" id="battery">98%</span></div>
                <div class="screen-line"><span class="label">信号</span><span class="value" id="signal">Excellent</span></div>
                <div class="screen-line"><span class="label">模式</span><span class="value" id="currentMode">STAND</span></div>
                <div class="screen-line"><span class="label">时间</span><span class="value" id="runtime">00:00:00</span></div>
            </div>
            
            <div class="mode-switch">
                <button class="mode-btn active" data-mode="walk">低速</button>
                <button class="mode-btn" data-mode="trot">Trot</button>
                <button class="mode-btn" data-mode="run">奔跑</button>
            </div>
            
            <div class="joystick-area">
                <div>
                    <div class="joystick-container" id="leftJoystick"><div class="joystick-base"></div><div class="joystick-stick" id="leftStick"></div></div>
                    <div class="joystick-label">移动控制</div>
                </div>
                <div>
                    <div class="joystick-container joystick-container-right" id="rightJoystick"><div class="joystick-base"></div><div class="joystick-stick joystick-stick-right" id="rightStick"></div></div>
                    <div class="joystick-label">视角/身体</div>
                </div>
            </div>
            
            <div class="button-row">
                <button class="ctrl-btn stand" onclick="setMode('stand')">站立</button>
                <button class="ctrl-btn sit" onclick="setMode('sit')">坐下</button>
            </div>
            <div class="button-row">
                <button class="ctrl-btn jump" onclick="action('jump')">跳跃</button>
                <button class="ctrl-btn emergency" onclick="action('emergency')">紧急</button>
            </div>
            
            <div class="body-control">
                <div class="slider-group">
                    <div class="slider-label"><span>身体高度</span><span class="value" id="heightValue">0.30m</span></div>
                    <input type="range" min="0.2" max="0.5" step="0.01" value="0.3" id="heightSlider">
                </div>
            </div>
            
            <div class="keyboard-hint">
                键盘: W/A/S/D 移动 | 空格 跳跃 | Esc 紧急停止
            </div>
        </div>
    </div>

    <a href="/" class="back-link">← 返回课程首页</a>

    <!-- Cannon.js - Bullet Physics Engine for Web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <!-- Three.js for rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ========================================
        // PyBullet-style Physics Simulation
        // Using Cannon.js (Bullet Physics port)
        // ========================================
        
        let world, robotBody, groundBody;
        let scene, camera, renderer, robot;
        let clock;
        
        // Physics state (matching PyBullet)
        const physicsState = {
            gravity: -9.81,
            timeStep: 1/240,
            linearDamping: 0.5,
            angularDamping: 0.5,
            friction: 0.7
        };
        
        // Control state
        const controlState = { forward: 0, lateral: 0, yaw: 0 };
        const robotState = { x: 0, y: 0.35, z: 0, vx: 0, vz: 0, yaw: 0 };
        let targetHeight = 0.3;
        let isJumping = false;
        let isSitting = false;
        let walkCycle = 0;
        
        function initPhysics() {
            // Create physics world (PyBullet style)
            world = new CANNON.World();
            world.gravity.set(0, physicsState.gravity, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;
            
            // Ground plane (static)
            const groundShape = new CANNON.Plane();
            groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(groundShape);
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI/2);
            groundBody.material = new CANNON.Material({ friction: physicsState.friction });
            world.addBody(groundBody);
            
            // Robot body (dynamic)
            const robotShape = new CANNON.Box(new CANNON.Vec3(0.2, 0.1, 0.15));
            robotBody = new CANNON.Body({
                mass: 5,
                position: new CANNON.Vec3(0, 0.35, 0),
                linearDamping: physicsState.linearDamping,
                angularDamping: physicsState.angularDamping
            });
            robotBody.addShape(robotShape);
            world.addBody(robotBody);
            
            console.log('PyBullet Physics initialized');
            console.log('Gravity:', physicsState.gravity, 'm/s²');
            console.log('Time step:', physicsState.timeStep, 's');
        }
        
        function init3D() {
            const container = document.getElementById('canvas-container');
            const canvas = document.getElementById('sim-canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 20);
            
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(3, 2.5, 3);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            
            // Ground with texture
            const groundGeo = new THREE.PlaneGeometry(30, 30);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x222233,
                roughness: 0.8
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid
            const grid = new THREE.GridHelper(30, 30, 0x00d4ff, 0x333355);
            grid.position.y = 0.01;
            scene.add(grid);
            
            // Create robot model
            createRobot();
            
            clock = new THREE.Clock();
        }
        
        function createRobot() {
            robot = new THREE.Group();
            
            // Body (matching physics box)
            const bodyGeo = new THREE.BoxGeometry(0.4, 0.2, 0.3);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0x00d4ff,
                metalness: 0.3,
                roughness: 0.7
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0;
            body.castShadow = true;
            robot.add(body);
            
            // Head
            const headGeo = new THREE.BoxGeometry(0.15, 0.12, 0.18);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.set(0.28, 0.08, 0);
            head.castShadow = true;
            robot.add(head);
            
            // Eyes (LED)
            const eyeGeo = new THREE.SphereGeometry(0.025, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(0.35, 0.1, 0.05);
            robot.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.35, 0.1, -0.05);
            robot.add(rightEye);
            
            // Legs (4 legs with 2 joints each)
            const legGeo = new THREE.BoxGeometry(0.06, 0.18, 0.06);
            const legMat = new THREE.MeshStandardMaterial({ 
                color: 0x0088aa,
                metalness: 0.5,
                roughness: 0.5
            });
            
            const legPositions = [
                { x: 0.18, z: 0.12 },  // Front-left
                { x: 0.18, z: -0.12 }, // Front-right
                { x: -0.18, z: 0.12 }, // Back-left
                { x: -0.18, z: -0.12 } // Back-right
            ];
            
            robot.legs = [];
            robot.legJoints = [];
            
            legPositions.forEach((pos, i) => {
                // Upper leg
                const upperLeg = new THREE.Mesh(legGeo, legMat);
                upperLeg.position.set(pos.x, -0.1, pos.z);
                upperLeg.castShadow = true;
                robot.add(upperLeg);
                robot.legs.push(upperLeg);
                
                // Lower leg
                const lowerLegGeo = new THREE.BoxGeometry(0.05, 0.15, 0.05);
                const lowerLeg = new THREE.Mesh(lowerLegGeo, legMat);
                lowerLeg.position.set(pos.x, -0.28, pos.z);
                lowerLeg.castShadow = true;
                robot.add(lowerLeg);
                robot.legs.push(lowerLeg);
            });
            
            // Tail
            const tailGeo = new THREE.BoxGeometry(0.12, 0.05, 0.05);
            const tail = new THREE.Mesh(tailGeo, bodyMat);
            tail.position.set(-0.26, 0.05, 0);
            robot.add(tail);
            robot.tail = tail;
            
            scene.add(robot);
        }
        
        function updatePhysics() {
            // Apply control forces (PyBullet style)
            const speed = 3.0;
            const turnSpeed = 2.0;
            
            // Calculate movement in robot's local frame
            const localVx = controlState.forward * speed;
            const localVz = controlState.lateral * speed;
            
            // Transform to world frame
            const cos = Math.cos(robotState.yaw);
            const sin = Math.sin(robotState.yaw);
            
            const worldVx = localVx * cos - localVz * sin;
            const worldVz = localVx * sin + localVz * cos;
            
            // Apply velocity (PyBullet uses velocity control)
            robotBody.velocity.x = worldVx;
            robotBody.velocity.z = worldVz;
            robotBody.angularVelocity.y = controlState.yaw * turnSpeed;
            
            // Jump impulse
            if (isJumping && robotBody.position.y < 0.5) {
                robotBody.velocity.y = 5;
                isJumping = false;
            }
            
            // Stand/Sit height control
            const targetY = isSitting ? 0.2 : targetHeight;
            if (!isJumping) {
                // Use spring to maintain height (PD control like PyBullet)
                const dy = targetY - robotBody.position.y;
                robotBody.velocity.y = dy * 50;
            }
            
            // Step physics simulation (PyBullet style)
            world.step(physicsState.timeStep);
            
            // Sync state
            robotState.x = robotBody.position.x;
            robotState.y = robotBody.position.y;
            robotState.z = robotBody.position.z;
            
            // Get orientation as euler
            const euler = new THREE.Euler();
            euler.setFromQuaternion(new THREE.Quaternion(
                robotBody.quaternion.x,
                robotBody.quaternion.y,
                robotBody.quaternion.z,
                robotBody.quaternion.w
            ));
            robotState.yaw = euler.y;
            
            robotState.vx = robotBody.velocity.x;
            robotState.vz = robotBody.velocity.z;
        }
        
        function updateVisuals() {
            // Update robot position from physics
            robot.position.set(robotState.x, robotState.y, robotState.z);
            robot.rotation.y = robotState.yaw;
            
            // Walking animation
            const speed = Math.sqrt(robotState.vx**2 + robotState.vz**2);
            if (speed > 0.1 || Math.abs(controlState.yaw) > 0.1) {
                walkCycle += speed * 0.5;
                
                // Animate legs
                robot.legs.forEach((leg, i) => {
                    const phase = i % 4;
                    const offset = Math.floor(i / 2) * Math.PI;
                    const legPhase = phase < 2 ? 0 : Math.PI;
                    leg.position.y = -0.1 - Math.sin(walkCycle + legPhase + offset) * 0.03;
                });
                
                // Tail wag
                robot.tail.rotation.z = Math.sin(walkCycle * 2) * 0.2;
            }
            
            // Camera follow
            const camDist = 3;
            const camHeight = 2.5;
            camera.position.x += (robotState.x + camDist * Math.cos(Math.PI/4) - camera.position.x) * 0.05;
            camera.position.z += (robotState.z + camDist * Math.sin(Math.PI/4) - camera.position.z) * 0.05;
            camera.position.y += (camHeight - camera.position.y) * 0.05;
            camera.lookAt(robotState.x, robotState.y + 0.2, robotState.z);
            
            renderer.render(scene, camera);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            updatePhysics();
            updateVisuals();
            
            // Update UI
            document.getElementById('posX').textContent = robotState.x.toFixed(2);
            document.getElementById('posY').textContent = robotState.y.toFixed(2);
            document.getElementById('posZ').textContent = robotState.z.toFixed(2);
            document.getElementById('vel').textContent = Math.sqrt(robotState.vx**2 + robotState.vz**2).toFixed(2);
        }
        
        function setMode(m) {
            document.getElementById('currentMode').textContent = m.toUpperCase();
            document.getElementById('mode').textContent = m.toUpperCase();
            isSitting = (m === 'sit');
        }
        
        function action(a) {
            if (a === 'jump' && !isJumping && !isSitting) {
                isJumping = true;
            } else if (a === 'emergency') {
                // Emergency stop - reset velocities
                robotBody.velocity.set(0, 0, 0);
                robotBody.angularVelocity.set(0, 0, 0);
                controlState.forward = 0;
                controlState.lateral = 0;
                controlState.yaw = 0;
                document.getElementById('leftStick').style.transform = 'translate(-50%,-50%)';
                document.getElementById('rightStick').style.transform = 'translate(-50%,-50%)';
            }
        }
        
        // Joystick controls
        const leftStick = document.getElementById('leftStick');
        let leftActive = false;
        document.getElementById('leftJoystick').addEventListener('mousedown', () => leftActive = true);
        document.addEventListener('mouseup', () => { leftActive = false; leftStick.style.transform = 'translate(-50%,-50%)'; controlState.forward=0; controlState.lateral=0; });
        document.getElementById('leftJoystick').addEventListener('mousemove', (e) => {
            if(!leftActive) return;
            const r = document.getElementById('leftJoystick').getBoundingClientRect();
            const x = Math.max(-1, Math.min(1, (e.clientX-r.left)/r.width*2-1));
            const y = Math.max(-1, Math.min(1, (e.clientY-r.top)/r.height*2-1));
            leftStick.style.transform = `translate(calc(-50%+${x*30}px), calc(-50%+${y*30}px))`;
            controlState.forward = -y; controlState.lateral = x;
        });
        
        const rightStick = document.getElementById('rightStick');
        let rightActive = false;
        document.getElementById('rightJoystick').addEventListener('mousedown', () => rightActive = true);
        document.addEventListener('mouseup', () => { rightActive = false; rightStick.style.transform = 'translate(-50%,-50%)'; controlState.yaw=0; });
        document.getElementById('rightJoystick').addEventListener('mousemove', (e) => {
            if(!rightActive) return;
            const r = document.getElementById('rightJoystick').getBoundingClientRect();
            const x = Math.max(-1, Math.min(1, (e.clientX-r.left)/r.width*2-1));
            rightStick.style.transform = `translate(calc(-50%+${x*25}px), calc(-50%+${x*25}px))`;
            controlState.yaw = -x;
        });
        
        // Height slider
        document.getElementById('heightSlider').addEventListener('input', (e) => {
            targetHeight = parseFloat(e.target.value);
            document.getElementById('heightValue').textContent = targetHeight.toFixed(2) + 'm';
        });
        
        // Keyboard
        const keys = {};
        document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; updateKbd(); });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; updateKbd(); });
        function updateKbd() {
            controlState.forward = (keys['w']?1:0) - (keys['s']?1:0);
            controlState.lateral = (keys['d']?1:0) - (keys['a']?1:0);
            controlState.yaw = (keys['arrowright']?1:0) - (keys['arrowleft']?1:0);
            if(keys[' ']) action('jump');
            if(keys['escape']) action('emergency');
        }
        
        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            setMode(b.dataset.mode);
        }));
        
        // Window resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // Initialize
        initPhysics();
        init3D();
        animate();
        
        // Runtime
        const startTime = Date.now();
        setInterval(() => {
            const t = Math.floor((Date.now() - startTime)/1000);
            document.getElementById('runtime').textContent = 
                Math.floor(t/3600).toString().padStart(2,'0') + ':' + 
                Math.floor(t%3600/60).toString().padStart(2,'0') + ':' + 
                (t%60).toString().padStart(2,'0');
        }, 1000);
        
        // Battery
        setInterval(() => document.getElementById('battery').textContent = (97+Math.floor(Math.random()*2))+'%', 5000);
    </script>
</body>
</html>
