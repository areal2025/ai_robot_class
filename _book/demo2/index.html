<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双臂机器人 - 强化学习叠布料</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
        
        .container { display: flex; height: 100vh; }
        
        .simulation { flex: 1; position: relative; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        .panel { 
            width: 340px; background: #222; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        
        .title { color: #00d4ff; text-align: center; font-size: 16px; font-weight: bold; }
        .subtitle { color: #ff6b6b; text-align: center; font-size: 12px; }
        
        .info-box {
            background: #111; padding: 15px; border-radius: 8px;
            border: 1px solid #333;
        }
        .info-box h4 { color: #00d4ff; margin-bottom: 10px; font-size: 12px; }
        
        .rl-status {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        .rl-stat {
            background: #0a0a15; padding: 10px; border-radius: 6px; text-align: center;
        }
        .rl-stat .label { font-size: 10px; color: #666; }
        .rl-stat .value { font-size: 16px; font-weight: bold; color: #00ff88; }
        .rl-stat .value.episode { color: #ffaa00; }
        
        .progress-bar {
            height: 6px; background: #333; border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #ff4444, #ffaa00, #00ff88);
            width: 0%; transition: width 0.2s;
        }
        
        .control-btns { display: flex; gap: 10px; }
        .control-btn {
            flex: 1; padding: 15px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-train { background: linear-gradient(90deg, #00d4ff, #7b2ff7); }
        .btn-reset { background: #ff4444; }
        
        .log-box {
            background: #0a0a15; padding: 10px; border-radius: 6px;
            max-height: 100px; overflow-y: auto;
            font-family: monospace; font-size: 10px; color: #666;
        }
        .log-box .log { margin: 2px 0; }
        .log-box .log.success { color: #00ff88; }
        .log-box .log.reward { color: #ffaa00; }
        
        .back { display: block; text-align: center; padding: 15px; color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="simulation">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="panel">
            <div>
                <div class="title">🤖 强化学习叠布料</div>
                <div class="subtitle">Deep Q-Learning 演示</div>
            </div>
            
            <div class="info-box">
                <h4>🧠 强化学习状态</h4>
                <div class="rl-status">
                    <div class="rl-stat">
                        <div class="label">Episode</div>
                        <div class="value episode" id="episode">0</div>
                    </div>
                    <div class="rl-stat">
                        <div class="label">Reward</div>
                        <div class="value" id="reward">0</div>
                    </div>
                    <div class="rl-stat">
                        <div class="label">Epsilon</div>
                        <div class="value" id="epsilon">1.00</div>
                    </div>
                    <div class="rl-stat">
                        <div class="label">成功率</div>
                        <div class="value" id="success">0%</div>
                    </div>
                </div>
            </div>
            
            <div class="info-box">
                <h4>📊 训练进度</h4>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:10px; color:#666; margin-top:5px;">
                    <span>探索</span><span>学习</span><span>收敛</span>
                </div>
            </div>
            
            <div class="info-box">
                <h4>📝 训练日志</h4>
                <div class="log-box" id="logBox"></div>
            </div>
            
            <div class="control-btns">
                <button class="control-btn btn-train" id="btnTrain" onclick="toggleTraining()">▶ 开始训练</button>
                <button class="control-btn btn-reset" onclick="resetSim()">↺ 重置</button>
            </div>
            
            <a href="/demo1/" class="back">← 返回机器狗Demo</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== Three.js 场景 ==========
        
        let scene, camera, renderer;
        let robot, leftArm, rightArm;
        let cloth, clothVertices;
        let leftGripper, rightGripper;
        
        // 机器人关节
        const joints = {
            left: { shoulder: null, elbow: null, wrist: null, fingers: [] },
            right: { shoulder: null, elbow: null, wrist: null, fingers: [] }
        };
        
        // ========== 强化学习 ==========
        const rl = {
            episode: 0,
            reward: 0,
            epsilon: 1.0,
            epsilonDecay: 0.995,
            minEpsilon: 0.05,
            learningRate: 0.1,
            gamma: 0.9,
            successCount: 0,
            totalEpisodes: 0,
            training: false,
            qTable: {},
            state: { clothFolded: 0, gripperPos: 0 },
            action: 0
        };
        
        // 状态离散化
        function getStateKey() {
            const foldLevel = Math.floor(cloth.foldLevel * 5);
            const gripperDist = Math.floor((gripperZ + 2) / 4 * 5);
            return `${foldLevel}-${gripperDist}`;
        }
        
        // Q学习
        function qLearning(state, action, reward, nextState) {
            const key = `${state}-${action}`;
            const nextKey = `${nextState}-*`;
            
            if (!rl.qTable[key]) rl.qTable[key] = 0;
            if (!rl.qTable[nextKey]) rl.qTable[nextKey] = 0;
            
            const oldQ = rl.qTable[key];
            const maxQ = Math.max(...Object.values(rl.qTable).filter((_, i) => {
                const k = Object.keys(rl.qTable)[i];
                return k.startsWith(nextState);
            }));
            
            rl.qTable[key] = oldQ + rl.learningRate * (reward + rl.gamma * maxQ - oldQ);
        }
        
        // 选择动作
        function chooseAction(state) {
            if (Math.random() < rl.epsilon) {
                return Math.floor(Math.random() * 4); // 探索
            }
            
            const key = state + '-';
            let bestAction = 0;
            let bestQ = -Infinity;
            
            for (let a = 0; a < 4; a++) {
                const q = rl.qTable[key + a] || 0;
                if (q > bestQ) {
                    bestQ = q;
                    bestAction = a;
                }
            }
            return bestAction;
        }
        
        // 动作执行
        function executeAction(action) {
            const moveSpeed = 0.1;
            
            switch(action) {
                case 0: // 左手伸出
                    joints.left.wrist.position.z = Math.max(-1.5, joints.left.wrist.position.z - moveSpeed);
                    break;
                case 1: // 右手伸出
                    joints.right.wrist.position.z = Math.min(1.5, joints.right.wrist.position.z + moveSpeed);
                    break;
                case 2: // 左手下压
                    joints.left.wrist.position.y = Math.max(0.5, joints.left.wrist.position.y - moveSpeed);
                    break;
                case 3: // 右手下压
                    joints.right.wrist.position.y = Math.max(0.5, joints.right.wrist.position.y - moveSpeed);
                    break;
            }
            
            // 更新夹爪位置
            updateGrippers();
        }
        
        // 计算奖励
        function calculateReward() {
            let reward = -0.1; // 每步小惩罚
            
            const leftZ = joints.left.wrist.position.z;
            const rightZ = joints.right.wrist.position.z;
            const clothZ = cloth.mesh.position.z;
            
            // 夹爪靠近布料
            if (Math.abs(leftZ - clothZ) < 0.3 && Math.abs(rightZ - clothZ) < 0.3) {
                reward += 0.5;
            }
            
            // 完成折叠
            if (cloth.foldLevel >= 0.8) {
                reward += 10;
                rl.successCount++;
                log('✨ Episode ' + rl.episode + ' 成功!', 'success');
                return true;
            }
            
            return false;
        }
        
        // 训练一步
        function trainingStep() {
            if (!rl.training) return;
            
            const state = getStateKey();
            const action = chooseAction(state);
            
            executeAction(action);
            updateClothPhysics();
            
            const done = calculateReward();
            const nextState = getStateKey();
            
            qLearning(state, action, rl.reward, nextState);
            
            // 更新Q值显示
            document.getElementById('reward').textContent = rl.reward.toFixed(1);
            
            if (done || Math.random() < 0.02) {
                // Episode结束
                rl.episode++;
                rl.totalEpisodes++;
                rl.epsilon = Math.max(rl.minEpsilon, rl.epsilon * rl.epsilonDecay);
                
                document.getElementById('episode').textContent = rl.episode;
                document.getElementById('epsilon').textContent = rl.epsilon.toFixed(2);
                document.getElementById('success').textContent = 
                    Math.floor(rl.successCount / Math.max(1, rl.episode) * 100) + '%';
                
                // 重置
                resetCloth();
                rl.reward = 0;
            }
            
            // 更新进度条
            const progress = (1 - rl.epsilon) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        let gripperZ = 0;
        
        function updateGrippers() {
            gripperZ = joints.left.wrist.position.z;
        }
        
        function log(msg, type) {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.className = 'log ' + (type || '');
            div.textContent = msg;
            box.insertBefore(div, box.firstChild);
            if (box.children.length > 10) box.removeChild(box.lastChild);
        }
        
        function toggleTraining() {
            rl.training = !rl.training;
            document.getElementById('btnTrain').textContent = rl.training ? '⏸ 暂停' : '▶ 继续训练';
            if (rl.training && rl.episode === 0) {
                rl.episode = 1;
                document.getElementById('episode').textContent = 1;
                log('🚀 开始强化学习训练...', 'success');
            }
        }
        
        // ========== Three.js 初始化 ==========
        
        let clothFoldLevel = 0;
        
        function init() {
            const canvas = document.getElementById('canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 4, 8);
            camera.lookAt(0, 1, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            
            // 灯光
            scene.add(new THREE.AmbientLight(0x404040, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // 地面
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 10),
                new THREE.MeshStandardMaterial({ color: 0x222233 })
            );
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            scene.add(new THREE.GridHelper(10, 20, 0x00d4ff, 0x333355));
            
            createTable();
            createRobot();
            createCloth();
            
            animate();
        }
        
        function createTable() {
            const tableMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const table = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 2), tableMat);
            table.position.set(0, 0.8, 0);
            table.receiveShadow = true;
            scene.add(table);
        }
        
        function createRobot() {
            // 基座
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.8 });
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.25, 32), baseMat);
            base.position.set(0, 0.93, 0);
            base.castShadow = true;
            scene.add(base);
            
            // 躯干
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.25), baseMat);
            torso.position.set(0, 1.28, 0);
            torso.castShadow = true;
            scene.add(torso);
            
            // 头
            const headMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, metalness: 0.9 });
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.18, 0.2), headMat);
            head.position.set(0, 1.6, 0);
            scene.add(head);
            
            // 眼睛
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            [[0.04, 0.04], [0.04, -0.04]].forEach(pos => {
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), eyeMat);
                eye.position.set(0.11, 1.62, pos[1]);
                scene.add(eye);
            });
            
            // 创建双臂 (高自由度)
            createArm(-0.18, 'left');
            createArm(0.18, 'right');
        }
        
        function createArm(xOffset, side) {
            const armMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, metalness: 0.7 });
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.9 });
            
            // 肩关节 (3自由度)
            const shoulder = new THREE.Group();
            shoulder.position.set(xOffset, 1.5, 0);
            scene.add(shoulder);
            
            const shoulderJoint = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), jointMat);
            shoulder.add(shoulderJoint);
            joints[side].shoulder = shoulder;
            
            // 上臂
            const upperArm = new THREE.Group();
            upperArm.position.y = -0.15;
            shoulder.add(upperArm);
            
            const upperArmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.04, 0.25, 16), armMat);
            upperArmMesh.position.y = -0.125;
            upperArm.add(upperArmMesh);
            
            // 肘关节 (2自由度)
            const elbow = new THREE.Group();
            elbow.position.y = -0.25;
            upperArm.add(elbow);
            
            const elbowJoint = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), jointMat);
            elbow.add(elbowJoint);
            joints[side].elbow = elbow;
            
            // 前臂
            const forearm = new THREE.Group();
            forearm.position.y = -0.1;
            elbow.add(forearm);
            
            const forearmMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.035, 0.22, 16), armMat);
            forearmMesh.position.y = -0.11;
            forearm.add(forearmMesh);
            
            // 腕关节 (2自由度)
            const wrist = new THREE.Group();
            wrist.position.y = -0.22;
            forearm.add(wrist);
            
            const wristJoint = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), jointMat);
            wrist.add(wristJoint);
            joints[side].wrist = wrist;
            
            // 夹爪
            const gripperBase = new THREE.Group();
            gripperBase.position.y = -0.06;
            wrist.add(gripperBase);
            
            // 夹爪手指 (2指)
            const fingerMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, metalness: 0.8 });
            
            const finger1 = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.08, 0.03), fingerMat);
            finger1.position.set(0.02, -0.04, 0);
            gripperBase.add(finger1);
            
            const finger2 = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.08, 0.03), fingerMat);
            finger2.position.set(-0.02, -0.04, 0);
            gripperBase.add(finger2);
            
            joints[side].gripperBase = gripperBase;
            joints[side].fingers = [finger1, finger2];
        }
        
        function createCloth() {
            // 布料 - 使用布料物理模拟
            const clothGeo = new THREE.PlaneGeometry(1.5, 1.2, 15, 12);
            const clothMat = new THREE.MeshStandardMaterial({ 
                color: 0xff6b6b, 
                side: THREE.DoubleSide,
                roughness: 0.9,
                metalness: 0.1
            });
            
            cloth = new THREE.Mesh(clothGeo, clothMat);
            cloth.rotation.x = -Math.PI/2;
            cloth.position.set(0, 0.86, 0);
            cloth.castShadow = true;
            scene.add(cloth);
            
            // 布料顶点 (用于物理模拟)
            clothVertices = [];
            const positions = cloth.geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                clothVertices.push({
                    x: positions.getX(i),
                    y: positions.getY(i),
                    z: positions.getZ(i),
                    vx: 0, vy: 0, vz: 0
                });
            }
            
            cloth.foldLevel = 0;
        }
        
        function updateClothPhysics() {
            const leftZ = joints.left.wrist ? joints.left.wrist.position.z : 0;
            const rightZ = joints.right.wrist ? joints.right.wrist.position.z : 0;
            
            // 简化的布料物理
            const positions = cloth.geometry.attributes.position;
            const time = Date.now() * 0.001;
            
            for (let i = 0; i < positions.count; i++) {
                const v = clothVertices[i];
                
                // 基础波动
                let wave = Math.sin(v.x * 3 + time * 2) * 0.01;
                
                // 折叠效果
                if (cloth.foldLevel > 0) {
                    const foldOffset = Math.sin(v.x * Math.PI * cloth.foldLevel) * cloth.foldLevel * 0.3;
                    v.z += foldOffset * 0.1;
                }
                
                // 重力
                v.vy -= 0.001;
                
                // 约束到平面
                v.y += v.vy;
                v.y = Math.max(0.86, Math.min(0.9, v.y));
                v.vy *= 0.9;
                
                positions.setZ(i, v.z + wave);
            }
            
            positions.needsUpdate = true;
            cloth.geometry.computeVertexNormals();
        }
        
        function resetCloth() {
            // 重置布料
            const positions = cloth.geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                positions.setZ(i, 0);
                clothVertices[i].z = 0;
                clothVertices[i].vy = 0;
            }
            positions.needsUpdate = true;
            
            cloth.foldLevel = 0;
            cloth.mesh.position.set(0, 0.86, 0);
            
            // 重置手臂
            ['left', 'right'].forEach(side => {
                if (joints[side].shoulder) {
                    joints[side].shoulder.rotation.set(0, 0, 0);
                }
            });
        }
        
        function resetSim() {
            rl.episode = 0;
            rl.reward = 0;
            rl.epsilon = 1.0;
            rl.successCount = 0;
            rl.qTable = {};
            rl.training = false;
            
            document.getElementById('episode').textContent = '0';
            document.getElementById('reward').textContent = '0';
            document.getElementById('epsilon').textContent = '1.00';
            document.getElementById('success').textContent = '0%';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('btnTrain').textContent = '▶ 开始训练';
            document.getElementById('logBox').innerHTML = '';
            
            resetCloth();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // 训练步骤
            if (rl.training) {
                trainingStep();
            }
            
            // 布料物理
            updateClothPhysics();
            
            renderer.render(scene, camera);
        }
        
        // 窗口调整
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('canvas');
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        });
        
        init();
    </script>
</body>
</html>
