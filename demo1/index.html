<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器狗仿真 - PyBullet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
        
        .container { display: flex; height: 100vh; }
        
        .simulation { flex: 1; position: relative; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        .panel { 
            width: 280px; background: #222; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto;
        }
        
        .title { color: #00d4ff; text-align: center; font-size: 14px; margin-bottom: 5px; }
        
        .status { background: #111; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
        .status-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .status .label { color: #666; }
        .status .value { color: #00ff88; }
        
        .dpad { 
            display: grid; grid-template-columns: repeat(3, 50px); 
            grid-template-rows: repeat(3, 50px); gap: 5px; 
            justify-content: center;
        }
        
        .btn {
            width: 50px; height: 50px; border-radius: 10px;
            border: none; font-size: 20px; cursor: pointer;
            background: #333; color: #fff;
            user-select: none; -webkit-user-select: none;
        }
        .btn:active, .btn.active { background: #00d4ff; color: #000; }
        
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .action-btn {
            padding: 12px 20px; border-radius: 8px; border: none;
            font-size: 12px; font-weight: bold; cursor: pointer;
            color: #fff; flex: 1;
        }
        .btn-jump { background: #ffaa00; }
        .btn-stop { background: #ff4444; }
        .btn-stand { background: #00ff88; color: #000; }
        .btn-sit { background: #4ecdc4; }
        
        .slider-box { background: #111; padding: 10px; border-radius: 8px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .slider-label .value { color: #00d4ff; }
        
        .hint { 
            background: #111; padding: 10px; border-radius: 8px; 
            font-size: 10px; color: #666; text-align: center;
        }
        
        .back { 
            display: block; text-align: center; padding: 10px; 
            color: #00d4ff; text-decoration: none; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="simulation">
            <canvas id="canvas"></canvas>
            <div class="status" style="position:absolute; top:10px; left:10px;">
                <div class="status-row"><span class="label">X:</span><span class="value" id="posX">0.00</span></div>
                <div class="status-row"><span class="label">Y:</span><span class="value" id="posY">0.00</span></div>
                <div class="status-row"><span class="label">速度:</span><span class="value" id="vel">0.00</span></div>
                <div class="status-row"><span class="label">模式:</span><span class="value" id="mode">STAND</span></div>
            </div>
        </div>
        
        <div class="panel">
            <div class="title">🤖 机器狗遥控器</div>
            
            <div class="status">
                <div class="status-row"><span class="label">电量</span><span class="value" id="battery">98%</span></div>
                <div class="status-row"><span class="label">模式</span><span class="value" id="curMode">STAND</span></div>
            </div>
            
            <div class="dpad">
                <button class="btn btn-up" id="btnUp">▲</button>
                <button class="btn btn-left" id="btnLeft">◀</button>
                <button class="btn btn-right" id="btnRight">▶</button>
                <button class="btn btn-down" id="btnDown">▼</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn btn-stand" id="btnStand">站立</button>
                <button class="action-btn btn-sit" id="btnSit">坐下</button>
            </div>
            <div class="action-btns">
                <button class="action-btn btn-jump" id="btnJump">跳跃</button>
                <button class="action-btn btn-stop" id="btnStop">停止</button>
            </div>
            
            <div class="slider-box">
                <div class="slider-label"><span>身体高度</span><span class="value" id="heightVal">0.30m</span></div>
                <input type="range" min="0.2" max="0.5" step="0.01" value="0.3" id="heightSlider" style="width:100%">
            </div>
            
            <div class="hint">键盘: W/A/S/D 移动 | 空格 跳跃 | Esc 停止</div>
            
            <a href="/" class="back">← 返回首页</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let world, robotBody, scene, camera, renderer, robot;
        const control = { forward: 0, lateral: 0, yaw: 0 };
        const state = { x: 0, y: 0.35, z: 0, vx: 0, vz: 0, yaw: 0, jumping: false, sitting: false, h: 0.3 };
        
        function init() {
            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.81, 0);
            world.addBody(new CANNON.Body({ mass: 0, shape: new CANNON.Plane() }). quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2));
            robotBody = new CANNON.Body({ mass: 5, position: new CANNON.Vec3(0, 0.35, 0), linearDamping: 0.5, angularDamping: 0.5 });
            robotBody.addShape(new CANNON.Box(new CANNON.Vec3(0.2, 0.1, 0.15)));
            world.addBody(robotBody);
            
            // 3D
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            const canvas = document.getElementById('canvas');
            camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(3, 2.5, 3);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            
            scene.add(new THREE.AmbientLight(0x404040, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            light.castShadow = true;
            scene.add(light);
            
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0x222233 }));
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            scene.add(new THREE.GridHelper(20, 20, 0x00d4ff, 0x333355));
            
            // Robot
            robot = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, metalness: 0.3 });
            robot.add(new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.3), mat));
            robot.add(new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.18), mat).translateXYZ(0.28, 0.08, 0));
            robot.add(new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 })).translateXYZ(0.35, 0.1, 0.05));
            robot.add(new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 })).translateXYZ(0.35, 0.1, -0.05));
            const legMat = new THREE.MeshStandardMaterial({ color: 0x0088aa });
            [[0.18, 0.12], [0.18, -0.12], [-0.18, 0.12], [-0.18, -0.12]].forEach(p => {
                robot.add(new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.06), legMat).translateXYZ(p[0], -0.1, p[1]));
            });
            scene.add(robot);
            
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Physics
            const speed = 3, turn = 2;
            const c = Math.cos(state.yaw), s = Math.sin(state.yaw);
            robotBody.velocity.x = control.forward * speed * c - control.lateral * speed * s;
            robotBody.velocity.z = control.forward * speed * s + control.lateral * speed * c;
            robotBody.angularVelocity.y = control.yaw * turn;
            
            if (state.jumping && robotBody.position.y < 0.5) { robotBody.velocity.y = 5; state.jumping = false; }
            if (!state.jumping) {
                const target = state.sitting ? 0.2 : state.h;
                robotBody.velocity.y = (target - robotBody.position.y) * 50;
            }
            
            world.step(1/240);
            
            state.x = robotBody.position.x;
            state.y = robotBody.position.y;
            state.z = robotBody.position.z;
            state.vx = robotBody.velocity.x;
            state.vz = robotBody.velocity.z;
            
            // Render
            robot.position.set(state.x, state.y, state.z);
            robot.rotation.y = state.yaw;
            
            camera.position.x += (state.x + 3 - camera.position.x) * 0.05;
            camera.position.z += (state.z + 3 - camera.position.z) * 0.05;
            camera.lookAt(state.x, state.y + 0.2, state.z);
            
            renderer.render(scene, camera);
            
            // UI
            document.getElementById('posX').textContent = state.x.toFixed(2);
            document.getElementById('posY').textContent = state.y.toFixed(2);
            document.getElementById('vel').textContent = Math.sqrt(state.vx**2 + state.vz**2).toFixed(2);
        }
        
        function updateBtn(id, active) {
            const btn = document.getElementById(id);
            if (active) btn.classList.add('active');
            else btn.classList.remove('active');
        }
        
        // Direction buttons
        const dpad = {
            btnUp: () => { control.forward = 1; updateBtn('btnUp', true); },
            btnDown: () => { control.forward = -1; updateBtn('btnDown', true); },
            btnLeft: () => { control.yaw = 1; updateBtn('btnLeft', true); },
            btnRight: () => { control.yaw = -1; updateBtn('btnRight', true); },
            end: () => { control.forward = 0; control.yaw = 0; ['btnUp','btnDown','btnLeft','btnRight'].forEach(id => updateBtn(id, false)); }
        };
        
        ['Up','Down','Left','Right'].forEach(dir => {
            const btn = document.getElementById('btn' + dir);
            btn.addEventListener('mousedown', dpad['btn' + dir]);
            btn.addEventListener('mouseup', dpad.end);
            btn.addEventListener('mouseleave', dpad.end);
            btn.addEventListener('touchstart', e => { e.preventDefault(); dpad['btn' + dir](); });
            btn.addEventListener('touchend', dpad.end);
        });
        
        // Action buttons
        document.getElementById('btnStand').addEventListener('click', () => { state.sitting = false; document.getElementById('curMode').textContent = 'STAND'; document.getElementById('mode').textContent = 'STAND'; });
        document.getElementById('btnSit').addEventListener('click', () => { state.sitting = true; document.getElementById('curMode').textContent = 'SIT'; document.getElementById('mode').textContent = 'SIT'; });
        document.getElementById('btnJump').addEventListener('click', () => { if (!state.sitting) state.jumping = true; });
        document.getElementById('btnStop').addEventListener('click', () => { robotBody.velocity.set(0,0,0); robotBody.angularVelocity.set(0,0,0); control = {forward:0,lateral:0,yaw:0}; dpad.end(); });
        
        // Height slider
        document.getElementById('heightSlider').addEventListener('input', e => { state.h = parseFloat(e.target.value); document.getElementById('heightVal').textContent = state.h.toFixed(2) + 'm'; });
        
        // Keyboard
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') { control.forward = 1; updateBtn('btnUp', true); }
            if (k === 's') { control.forward = -1; updateBtn('btnDown', true); }
            if (k === 'a') { control.yaw = 1; updateBtn('btnLeft', true); }
            if (k === 'd') { control.yaw = -1; updateBtn('btnRight', true); }
            if (k === ' ') { if (!state.sitting) state.jumping = true; }
            if (k === 'escape') document.getElementById('btnStop').click();
        });
        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 's') control.forward = 0;
            if (k === 'a' || k === 'd') control.yaw = 0;
            dpad.end();
        });
        
        // Battery
        setInterval(() => document.getElementById('battery').textContent = (97 + Math.floor(Math.random() * 2)) + '%', 5000);
        
        init();
    </script>
</body>
</html>
