<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyBullet 机器狗仿真 - 真实物理引擎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; }
        
        .container { display: flex; height: 100vh; }
        
        .simulation { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        
        .sim-viewer {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%);
        }
        
        .sim-viewer img {
            max-width: 90%; max-height: 80%;
            border: 2px solid #00d4ff;
            border-radius: 8px;
        }
        
        .sim-status {
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            text-align: center;
        }
        
        .sim-status h3 { color: #00d4ff; margin-bottom: 10px; }
        .sim-status p { color: #888; font-size: 12px; }
        
        .sim-status.connected {
            background: rgba(0, 255, 136, 0.1);
            border-color: #00ff88;
        }
        
        .sim-status.connected h3 { color: #00ff88; }
        
        .panel { 
            width: 300px; background: #222; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        
        .title { color: #00d4ff; text-align: center; font-size: 16px; font-weight: bold; }
        .subtitle { color: #ff6b6b; text-align: center; font-size: 12px; margin-top: -10px; }
        
        .status { background: #111; padding: 15px; border-radius: 8px; }
        .status-row { display: flex; justify-content: space-between; margin: 5px 0; font-family: monospace; font-size: 12px; }
        .status .label { color: #666; }
        .status .value { color: #00ff88; }
        .status .value.warning { color: #ffaa00; }
        .status .value.error { color: #ff4444; }
        
        .dpad { 
            display: grid; grid-template-columns: repeat(3, 60px); 
            grid-template-rows: repeat(3, 60px); gap: 8px; 
            justify-content: center;
        }
        
        .btn {
            width: 60px; height: 60px; border-radius: 12px;
            border: none; font-size: 22px; cursor: pointer;
            background: #333; color: #fff;
            user-select: none;
            transition: all 0.1s;
        }
        .btn:active, .btn.active { 
            background: #00d4ff; color: #000;
            transform: scale(0.95);
        }
        
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .action-btns { display: flex; gap: 10px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 10px; border: none;
            font-size: 13px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-jump { background: #ffaa00; }
        .btn-stop { background: #ff4444; }
        
        .mode-btns { display: flex; gap: 5px; }
        .mode-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #333;
            background: transparent; color: #666; font-size: 11px; cursor: pointer;
        }
        .mode-btn.active { border-color: #00d4ff; background: rgba(0,212,255,0.2); color: #00d4ff; }
        
        .slider-box { background: #111; padding: 15px; border-radius: 8px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .slider-label .value { color: #00d4ff; }
        
        .hint { background: #111; padding: 12px; border-radius: 8px; font-size: 11px; color: #666; text-align: center; }
        
        .back { display: block; text-align: center; padding: 15px; color: #00d4ff; text-decoration: none; }
        
        .connection-info {
            background: #111; padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 10px; color: #666; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="simulation">
            <div class="sim-viewer" id="simViewer">
                <div class="sim-status" id="simStatus">
                    <h3>🔌 PyBullet 仿真</h3>
                    <p>等待连接...</p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div>
                <div class="title">🤖 PyBullet 控制器</div>
                <div class="subtitle">真实物理引擎</div>
            </div>
            
            <div class="connection-info">
                服务器: localhost:8765<br>
                令牌: ai-robotics-course-2026
            </div>
            
            <div class="status">
                <div class="status-row"><span class="label">连接状态</span><span class="value" id="connStatus">未连接</span></div>
                <div class="status-row"><span class="label">位置 X</span><span class="value" id="posX">--</span></div>
                <div class="status-row"><span class="label">位置 Y</span><span class="value" id="posY">--</span></div>
                <div class="status-row"><span class="label">位置 Z</span><span class="value" id="posZ">--</span></div>
                <div class="status-row"><span class="label">速度</span><span class="value" id="velocity">--</span></div>
                <div class="status-row"><span class="label">模式</span><span class="value" id="mode">WAIT</span></div>
            </div>
            
            <div class="dpad">
                <button class="btn btn-up" id="btnUp">▲</button>
                <button class="btn btn-left" id="btnLeft">◀</button>
                <button class="btn btn-right" id="btnRight">▶</button>
                <button class="btn btn-down" id="btnDown">▼</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn btn-jump" id="btnJump">🦘 跳跃</button>
                <button class="action-btn btn-stop" id="btnStop">🛑 停止</button>
            </div>
            
            <div class="mode-btns">
                <button class="mode-btn active" data-mode="walk">低速</button>
                <button class="mode-btn" data-mode="trot">Trot</button>
                <button class="mode-btn" data-mode="run">奔跑</button>
            </div>
            
            <div class="slider-box">
                <div class="slider-label"><span>身体高度</span><span class="value" id="heightVal">0.30m</span></div>
                <input type="range" min="0.2" max="0.5" step="0.01" value="0.3" id="heightSlider" style="width:100%">
            </div>
            
            <div class="hint">键盘: W/A/S/D 移动 | 空格 跳跃 | Esc 停止</div>
            
            <a href="/" class="back">← 返回首页</a>
        </div>
    </div>

    <script>
        const TOKEN = "ai-robotics-course-2026";
        const WS_URL = `ws://${window.location.hostname || 'localhost'}:8765`;
        
        let ws = null;
        let authenticated = false;
        let controlState = { forward: 0, lateral: 0, yaw: 0, height: 0.3 };
        
        function connect() {
            console.log("连接WebSocket:", WS_URL);
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log("WebSocket已连接");
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onerror = (error) => {
                console.error("WebSocket错误:", error);
                updateStatus("error", "连接错误");
            };
            
            ws.onclose = () => {
                console.log("WebSocket断开");
                updateStatus("error", "断开连接");
                authenticated = false;
                // 尝试重连
                setTimeout(connect, 3000);
            };
        }
        
        function handleMessage(data) {
            switch(data.type) {
                case 'welcome':
                    // 发送认证
                    ws.send(JSON.stringify({ type: 'auth', token: TOKEN }));
                    break;
                    
                case 'auth_success':
                    authenticated = true;
                    updateStatus("connected", "已连接");
                    document.getElementById('simStatus').classList.add('connected');
                    document.getElementById('simStatus').innerHTML = '<h3>✅ PyBullet 运行中</h3><p>真实物理仿真</p>';
                    break;
                    
                case 'auth_failed':
                    updateStatus("error", "认证失败");
                    break;
                    
                case 'state':
                    if (data.data) {
                        updateRobotState(data.data);
                    }
                    break;
                    
                case 'reset_done':
                    console.log("已重置");
                    break;
            }
        }
        
        function updateStatus(status, text) {
            const el = document.getElementById('connStatus');
            el.textContent = text;
            el.className = 'value' + (status === 'connected' ? '' : status === 'error' ? ' error' : '');
        }
        
        function updateRobotState(state) {
            if (state.position) {
                document.getElementById('posX').textContent = state.position[0].toFixed(2);
                document.getElementById('posY').textContent = state.position[1].toFixed(2);
                document.getElementById('posZ').textContent = state.position[2].toFixed(2);
            }
            if (state.velocity) {
                const v = Math.sqrt(state.velocity[0]**2 + state.velocity[2]**2);
                document.getElementById('velocity').textContent = v.toFixed(2);
            }
        }
        
        function sendAction() {
            if (!ws || !authenticated) return;
            
            ws.send(JSON.stringify({
                type: 'action',
                action: controlState
            }));
        }
        
        // 方向控制
        function setDirection(forward, yaw) {
            controlState.forward = forward;
            controlState.yaw = yaw;
            sendAction();
            
            // 更新按钮状态
            document.getElementById('btnUp').classList.toggle('active', forward > 0);
            document.getElementById('btnDown').classList.toggle('active', forward < 0);
            document.getElementById('btnLeft').classList.toggle('active', yaw > 0);
            document.getElementById('btnRight').classList.toggle('active', yaw < 0);
        }
        
        // 按钮事件
        document.getElementById('btnUp').addEventListener('mousedown', () => setDirection(1, 0));
        document.getElementById('btnUp').addEventListener('mouseup', () => setDirection(0, 0));
        document.getElementById('btnUp').addEventListener('mouseleave', () => setDirection(0, 0));
        
        document.getElementById('btnDown').addEventListener('mousedown', () => setDirection(-1, 0));
        document.getElementById('btnDown').addEventListener('mouseup', () => setDirection(0, 0));
        document.getElementById('btnDown').addEventListener('mouseleave', () => setDirection(0, 0));
        
        document.getElementById('btnLeft').addEventListener('mousedown', () => setDirection(0, 1));
        document.getElementById('btnLeft').addEventListener('mouseup', () => setDirection(0, 0));
        document.getElementById('btnLeft').addEventListener('mouseleave', () => setDirection(0, 0));
        
        document.getElementById('btnRight').addEventListener('mousedown', () => setDirection(0, -1));
        document.getElementById('btnRight').addEventListener('mouseup', () => setDirection(0, 0));
        document.getElementById('btnRight').addEventListener('mouseleave', () => setDirection(0, 0));
        
        // 触摸支持
        ['Up','Down','Left','Right'].forEach(dir => {
            const btn = document.getElementById('btn' + dir);
            btn.addEventListener('touchstart', e => { e.preventDefault(); 
                if(dir==='Up') setDirection(1,0);
                if(dir==='Down') setDirection(-1,0);
                if(dir==='Left') setDirection(0,1);
                if(dir==='Right') setDirection(0,-1);
            });
            btn.addEventListener('touchend', e => { e.preventDefault(); setDirection(0,0); });
        });
        
        // 动作按钮
        document.getElementById('btnJump').addEventListener('click', () => {
            if (!ws || !authenticated) return;
            ws.send(JSON.stringify({ type: 'action', action: { jump: true } }));
        });
        
        document.getElementById('btnStop').addEventListener('click', () => {
            setDirection(0, 0);
            controlState.height = 0.3;
            if (!ws || !authenticated) return;
            ws.send(JSON.stringify({ type: 'reset' }));
        });
        
        // 高度滑块
        document.getElementById('heightSlider').addEventListener('input', e => {
            controlState.height = parseFloat(e.target.value);
            document.getElementById('heightVal').textContent = controlState.height.toFixed(2) + 'm';
            sendAction();
        });
        
        // 模式按钮
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('mode').textContent = btn.dataset.mode.toUpperCase();
            });
        });
        
        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            updateKeyboard();
        });
        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
            updateKeyboard();
        });
        
        function updateKeyboard() {
            const forward = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
            const yaw = (keys['arrowright'] ? 1 : 0) - (keys['arrowleft'] ? 1 : 0);
            if (forward !== controlState.forward || yaw !== controlState.yaw) {
                setDirection(forward, yaw);
            }
            if (keys[' ']) {
                document.getElementById('btnJump').click();
            }
            if (keys['escape']) {
                document.getElementById('btnStop').click();
            }
        }
        
        // 启动连接
        connect();
    </script>
</body>
</html>
