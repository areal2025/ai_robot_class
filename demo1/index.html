<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器狗仿真 - 物理引擎版本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
        
        .container { display: flex; height: 100vh; }
        
        .simulation { flex: 1; position: relative; background: #000; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        .panel { 
            width: 300px; background: #222; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }
        
        .title { color: #00d4ff; text-align: center; font-size: 16px; font-weight: bold; }
        .subtitle { color: #ff6b6b; text-align: center; font-size: 12px; }
        
        .status { background: #111; padding: 15px; border-radius: 8px; }
        .status-row { display: flex; justify-content: space-between; margin: 5px 0; font-family: monospace; font-size: 12px; }
        .status .label { color: #666; }
        .status .value { color: #00ff88; }
        
        .dpad { 
            display: grid; grid-template-columns: repeat(3, 60px); 
            grid-template-rows: repeat(3, 60px); gap: 8px; 
            justify-content: center;
        }
        
        .btn {
            width: 60px; height: 60px; border-radius: 12px;
            border: none; font-size: 22px; cursor: pointer;
            background: #333; color: #fff;
            user-select: none; transition: all 0.1s;
        }
        .btn:active, .btn.active { background: #00d4ff; color: #000; }
        
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        
        .action-btns { display: flex; gap: 10px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 10px; border: none;
            font-size: 13px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .btn-jump { background: #ffaa00; }
        .btn-stop { background: #ff4444; }
        
        .slider-box { background: #111; padding: 15px; border-radius: 8px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .slider-label .value { color: #00d4ff; }
        
        .hint { background: #111; padding: 12px; border-radius: 8px; font-size: 11px; color: #666; text-align: center; }
        
        .physics-info {
            background: #111; padding: 10px; border-radius: 8px;
            font-size: 10px; color: #888; text-align: center;
        }
        
        .back { display: block; text-align: center; padding: 15px; color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="simulation">
            <canvas id="canvas"></canvas>
            <div class="status" style="position:absolute; top:10px; left:10px;">
                <div class="status-row"><span class="label">位置 X</span><span class="value" id="posX">0.00</span></div>
                <div class="status-row"><span class="label">位置 Y</span><span class="value" id="posY">0.00</span></div>
                <div class="status-row"><span class="label">速度</span><span class="value" id="vel">0.00</span></div>
                <div class="status-row"><span class="label">模式</span><span class="value" id="mode">STAND</span></div>
            </div>
        </div>
        
        <div class="panel">
            <div>
                <div class="title">🤖 机器狗遥控器</div>
                <div class="subtitle">Cannon.js 物理引擎</div>
            </div>
            
            <div class="physics-info">
                重力: -9.81 m/s² | 时间步: 1/240s<br>
                基于Bullet Physics引擎
            </div>
            
            <div class="status">
                <div class="status-row"><span class="label">连接状态</span><span class="value">本地运行</span></div>
                <div class="status-row"><span class="label">电池</span><span class="value" id="battery">98%</span></div>
                <div class="status-row"><span class="label">模式</span><span class="value" id="curMode">STAND</span></div>
            </div>
            
            <div class="dpad">
                <button class="btn btn-up" id="btnUp">▲</button>
                <button class="btn btn-left" id="btnLeft">◀</button>
                <button class="btn btn-right" id="btnRight">▶</button>
                <button class="btn btn-down" id="btnDown">▼</button>
            </div>
            
            <div class="action-btns">
                <button class="action-btn btn-jump" id="btnJump">🦘 跳跃</button>
                <button class="action-btn btn-stop" id="btnStop">🛑 停止</button>
            </div>
            
            <div class="slider-box">
                <div class="slider-label"><span>身体高度</span><span class="value" id="heightVal">0.30m</span></div>
                <input type="range" min="0.2" max="0.5" step="0.01" value="0.3" id="heightSlider" style="width:100%">
            </div>
            
            <div class="hint">键盘: W/A/S/D 移动 | 空格 跳跃 | Esc 停止</div>
            
            <a href="/" class="back">← 返回首页</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== Cannon.js 物理引擎 (Bullet Physics端口) ==========
        
        let world, robotBody, groundBody;
        let scene, camera, renderer, robot;
        
        // 物理参数 (PyBullet风格)
        const PHYSICS = {
            gravity: -9.81,
            timeStep: 1/240,
            linearDamping: 0.5,
            angularDamping: 0.5
        };
        
        const control = { forward: 0, lateral: 0, yaw: 0 };
        const state = { x: 0, y: 0.35, z: 0, vx: 0, vz: 0, yaw: 0, jumping: false, sitting: false, h: 0.3 };
        
        function initPhysics() {
            // 创建物理世界
            world = new CANNON.World();
            world.gravity.set(0, PHYSICS.gravity, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;
            
            // 地面
            const groundShape = new CANNON.Plane();
            groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(groundShape);
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI/2);
            world.addBody(groundBody);
            
            // 机器人
            const robotShape = new CANNON.Box(new CANNON.Vec3(0.2, 0.1, 0.15));
            robotBody = new CANNON.Body({
                mass: 5,
                position: new CANNON.Vec3(0, 0.35, 0),
                linearDamping: PHYSICS.linearDamping,
                angularDamping: PHYSICS.angularDamping
            });
            robotBody.addShape(robotShape);
            world.addBody(robotBody);
            
            console.log('Cannon.js 物理引擎初始化完成');
            console.log('重力:', PHYSICS.gravity, 'm/s²');
            console.log('时间步:', PHYSICS.timeStep, 's');
        }
        
        function init3D() {
            const canvas = document.getElementById('canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 20);
            
            camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(3, 2.5, 3);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // 灯光
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            
            // 地面
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 })
            );
            ground.rotation.x = -Math.PI/2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 网格
            const grid = new THREE.GridHelper(20, 20, 0xff6600, 0x333355);
            grid.position.y = 0.01;
            scene.add(grid);
            
            // 创建机器人模型
            createRobot();
        }
        
        function createRobot() {
            robot = new THREE.Group();
            
            // 身体
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.3, roughness: 0.7 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.12, 0.18), bodyMat);
            body.position.y = 0;
            body.castShadow = true;
            robot.add(body);
            
            // 头部
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.18), bodyMat);
            head.position.set(0.28, 0.08, 0);
            head.castShadow = true;
            robot.add(head);
            
            // 眼睛
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), eyeMat);
            leftEye.position.set(0.35, 0.1, 0.05);
            robot.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), eyeMat);
            rightEye.position.set(0.35, 0.1, -0.05);
            robot.add(rightEye);
            
            // 腿部
            const legMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.5, roughness: 0.5 });
            const legGeo = new THREE.BoxGeometry(0.06, 0.18, 0.06);
            const legPositions = [[0.18, 0.12], [0.18, -0.12], [-0.18, 0.12], [-0.18, -0.12]];
            
            robot.legs = [];
            legPositions.forEach((pos, i) => {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(pos[0], -0.1, pos[1]);
                leg.castShadow = true;
                robot.add(leg);
                robot.legs.push(leg);
            });
            
            // 尾巴
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.05), bodyMat);
            tail.position.set(-0.26, 0.05, 0);
            robot.add(tail);
            robot.tail = tail;
            
            scene.add(robot);
        }
        
        function updatePhysics() {
            // 速度控制 (PyBullet风格)
            const speed = 3.0;
            const turnSpeed = 2.0;
            
            // 世界坐标系转换
            const cos = Math.cos(state.yaw);
            const sin = Math.sin(state.yaw);
            
            robotBody.velocity.x = control.forward * speed * cos - control.lateral * speed * sin;
            robotBody.velocity.z = control.forward * speed * sin + control.lateral * speed * cos;
            robotBody.angularVelocity.y = control.yaw * turnSpeed;
            
            // 跳跃 - 直接应用脉冲
            if (state.jumping && (!state.jumpCooldown || state.jumpCooldown <= 0)) {
                robotBody.velocity.y = 8;  // 更大的跳跃力
                state.jumping = false; state.jumpCooldown = 30
            }
            
            // 高度控制 (PD控制器)
            const targetY = state.sitting ? 0.2 : state.h;
            const dy = targetY - robotBody.position.y;
            robotBody.velocity.y += dy * 30;  // 弹簧效果
            
            // 物理步进
            world.step(PHYSICS.timeStep);
            if (state.jumpCooldown > 0) state.jumpCooldown--;
            
            // 同步状态
            state.x = robotBody.position.x;
            state.y = robotBody.position.y;
            state.z = robotBody.position.z;
            state.vx = robotBody.velocity.x;
            state.vz = robotBody.velocity.z;
            
            // 获取欧拉角
            const euler = new THREE.Euler().setFromQuaternion(
                new THREE.Quaternion(
                    robotBody.quaternion.x,
                    robotBody.quaternion.y,
                    robotBody.quaternion.z,
                    robotBody.quaternion.w
                )
            );
            state.yaw = euler.y;
        }
        
        function updateVisuals() {
            // 更新机器人位置
            robot.position.set(state.x, state.y, state.z);
            robot.rotation.y = state.yaw;
            
            // 行走动画
            const speed = Math.sqrt(state.vx**2 + state.vz**2);
            if (speed > 0.1 || Math.abs(control.yaw) > 0.1) {
                const walkCycle = Date.now() * 0.01;
                robot.legs.forEach((leg, i) => {
                    if (i % 2 === 0) leg.position.y = -0.06 + Math.sin(walkCycle + i * 0.5) * 0.02;
                    const offset = i < 2 ? 0 : Math.PI;
                    leg.position.y = -0.18 + Math.sin(walkCycle + offset) * 0.03;
                });
                // 尾巴摇摆
                if (robot.tail) {
                    robot.tail.rotation.z = Math.sin(walkCycle * 2) * 0.2;
                }
            }
            
            // 相机跟随
            camera.position.x += (state.x + 3 - camera.position.x) * 0.05;
            camera.position.z += (state.z + 3 - camera.position.z) * 0.05;
            camera.position.y += (2.5 - camera.position.y) * 0.05;
            camera.lookAt(state.x, state.y + 0.2, state.z);
            
            renderer.render(scene, camera);
            
            // 更新UI
            document.getElementById('posX').textContent = state.x.toFixed(2);
            document.getElementById('posY').textContent = state.y.toFixed(2);
            document.getElementById('vel').textContent = speed.toFixed(2);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateVisuals();
        }
        
        // 方向控制
        function setDirection(forward, yaw) {
            control.forward = forward;
            control.yaw = yaw;
            
            document.getElementById('btnUp').classList.toggle('active', forward > 0);
            document.getElementById('btnDown').classList.toggle('active', forward < 0);
            document.getElementById('btnLeft').classList.toggle('active', yaw > 0);
            document.getElementById('btnRight').classList.toggle('active', yaw < 0);
        }
        
        ['Up','Down','Left','Right'].forEach(dir => {
            const btn = document.getElementById('btn' + dir);
            btn.addEventListener('mousedown', () => {
                if(dir==='Up') setDirection(1, 0);
                if(dir==='Down') setDirection(-1, 0);
                if(dir==='Left') setDirection(0, 1);
                if(dir==='Right') setDirection(0, -1);
            });
            btn.addEventListener('mouseup', () => setDirection(0, 0));
            btn.addEventListener('mouseleave', () => setDirection(0, 0));
            // 触摸支持
            btn.addEventListener('touchstart', e => { e.preventDefault();
                if(dir==='Up') setDirection(1, 0);
                if(dir==='Down') setDirection(-1, 0);
                if(dir==='Left') setDirection(0, 1);
                if(dir==='Right') setDirection(0, -1);
            });
            btn.addEventListener('touchend', () => setDirection(0, 0));
        });
        
        // 动作按钮
        document.getElementById('btnJump').addEventListener('click', () => {
            if (!state.sitting) state.jumping = true;
        });
        
        document.getElementById('btnStop').addEventListener('click', () => {
            robotBody.velocity.set(0, 0, 0);
            robotBody.angularVelocity.set(0, 0, 0);
            setDirection(0, 0);
        });
        
        // 高度滑块
        document.getElementById('heightSlider').addEventListener('input', e => {
            state.h = parseFloat(e.target.value);
            document.getElementById('heightVal').textContent = state.h.toFixed(2) + 'm';
        });
        
        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            updateKeyboard();
        });
        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
            updateKeyboard();
        });
        
        function updateKeyboard() {
            const forward = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0);
            const yaw = (keys['arrowright'] ? 1 : 0) - (keys['arrowleft'] ? 1 : 0);
            if (forward !== control.forward || yaw !== control.yaw) {
                setDirection(forward, yaw);
            }
            if (keys[' '] && !state.sitting) state.jumping = true;
            if (keys['escape']) document.getElementById('btnStop').click();
        }
        
        // 窗口大小调整
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('canvas');
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        });
        
        // 电池模拟
        setInterval(() => {
            document.getElementById('battery').textContent = (97 + Math.floor(Math.random() * 2)) + '%';
        }, 5000);
        
        // 初始化
        initPhysics();
        init3D();
        animate();
    </script>
</body>
</html>
